name: CI NestJS

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Cache Prisma Client
      uses: actions/cache@v4
      with:
        path: node_modules/.prisma
        key: ${{ runner.os }}-prisma-${{ hashFiles('**/schema.prisma') }}

    # UPDATE 1: Menambahkan env dummy agar proses generator Prisma 7 tidak crash di server CI
    - name: Generate Prisma Client
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
      run: npx prisma generate

    # UPDATE 2: Menambahkan env dummy juga di sini karena pengujian unit test biasanya memuat modul PrismaService
    - name: Run unit tests
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
      run: npm run test

    - name: Build application
      run: npm run build